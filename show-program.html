<!DOCTYPE html>
<html>
  <head>
    <title>HOME</title>
    <link
      rel="icon"
      href="https://raw.githubusercontent.com/ntillier/nathantiprograming-webpage/annex/logo.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=The+Nautigal&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./sources/default.css" />

    <script src="./sources/default.js"></script>

    <style>
      :root {
        --height: 400px,
        --width: 500px;
      }
      iframe {
        position: relative;
        width: var(--width);
        height: var(--height);
        display: block;
        margin: 0 auto;
        margin-bottom: 20px;
      }
      article {
        text-align: center;
      }
      h1 {
        display: block;
        text-align: center;
      }
      span {
        padding: 5px;
        background: #EEE;
        border-radius: 5px;
        margin: 10px;
      }
    </style>
  </head>

  <header></header>

  <body>
    <article>
      <h1></h1>
      <iframe frameborder="0"></iframe>
    </article>
  </body>

  <footer></footer>

  <script>
    (function () {
      const query = window.location.search;
      const id = new URLSearchParams(query).get('id');
      const name = new URLSearchParams(query).get('name');
      const width = new URLSearchParams(query).get('width');
      const height = new URLSearchParams(query).get('height');
      const types = new URLSearchParams(query).get('types').split(" ");
      const date = new URLSearchParams(query).get('date');
      const description = new URLSearchParams(query).get('description');

      var tag = (s) => {
        return document.getElementsByTagName(s)[0];
      };
      tag('title').innerHTML = tag('h1').innerHTML = name;
      tag('iframe').src = `https://www.khanacademy.org/computer-programming/-/${id}/embedded?id=${new Date().getTime()}-${Math.random()}&origin=https%3A%2F%2Fwww.kasandbox.org&buttons=no&embed=yes&editor=no&author=yes&width=${width}&height=${height}`;

      types.forEach((item) => {
        tag('article').innerHTML += `<span>${item}</span>`;
      });

      tag('article').innerHTML += `<br><br><i>${date}</i>`;
      tag('article').innerHTML += `<br><br><b>${description}</b>`;

      var s = document.documentElement.style;
      s.setProperty('--width', `${width}px`);
      s.setProperty('--height', `${height}px`);
    })();
  </script>
</html>
